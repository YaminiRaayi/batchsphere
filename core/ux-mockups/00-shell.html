<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BatchSphere — Shared Shell Snippet</title>
  <!--
    This file documents the common sidebar + header shell used in all mockups.
    It is NOT a standalone page — it is included by reference in the other mockup files.
  -->
</head>
<body>
<!--
SIDEBAR (bg-blue-900, w-64, fixed left) — copy into each mockup
Active nav item: bg-white/10 text-white
Inactive nav item: text-blue-200 hover:bg-white/10 hover:text-white
Group label: text-[10px] font-bold uppercase tracking-[0.3em] text-blue-300
Soon badge: bg-white/15 text-blue-100 text-[9px] rounded-full px-1.5 py-0.5

HEADER (bg-white, border-b border-blue-100, h-14, sticky)
Breadcrumbs: text-xs text-slate-400 / active: text-blue-700 font-medium

STATUS BADGE PALETTE
  OPEN / REQUESTED     → bg-blue-100   text-blue-700
  IN_PROGRESS          → bg-orange-100 text-orange-700
  COMPLETED / VALID    → bg-amber-100  text-amber-700
  APPROVED / RELEASED  → bg-green-100  text-green-700
  REJECTED / EXPIRED   → bg-rose-100   text-rose-700
  UNDER_INVESTIGATION  → bg-fuchsia-100 text-fuchsia-700
  UNDER_REVIEW         → bg-violet-100 text-violet-700
  CLOSED               → bg-slate-100  text-slate-600
  CRITICAL             → bg-red-100    text-red-700
  MAJOR                → bg-amber-100  text-amber-700
  MINOR                → bg-blue-100   text-blue-700
  EXPIRING_SOON        → bg-yellow-100 text-yellow-700
  QUARANTINE           → bg-yellow-100 text-yellow-700
  PLANNED              → bg-slate-100  text-slate-600
  QC_PENDING           → bg-violet-100 text-violet-700
  CAPA_IN_PROGRESS     → bg-orange-100 text-orange-700
-->
</body>
</html>
