spring:
  datasource:
    url: jdbc:h2:mem:batchsphere-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    out-of-order: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  auth:
    jwt:
      secret: batchsphere-test-jwt-secret
      expiration-seconds: 3600
      refresh-expiration-seconds: 604800
    bootstrap-admin:
      username: admin
      email: admin@batchsphere.test
      password: Admin@123
      role: SUPER_ADMIN
    seed-users:
      - username: qc.analyst
        email: qc.analyst@batchsphere.test
        password: Admin@123
        role: QC_ANALYST
      - username: qc.manager
        email: qc.manager@batchsphere.test
        password: Admin@123
        role: QC_MANAGER
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  storage:
    root: /tmp/batchsphere-test-storage
