spring:
  datasource:
    url: jdbc:h2:mem:batchsphere-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    out-of-order: true
    baseline-on-migrate: true
    locations: classpath:db/migration
