spring:
  application:
    name: batchsphere-core

  datasource:
    url: jdbc:postgresql://localhost:5432/batchsphere_db
    username: batchsphere_user
    password: StrongPassword123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    validate-on-migrate: false
    out-of-order: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8080

app:
  auth:
    jwt:
      secret: batchsphere-dev-jwt-secret-change-me
      expiration-seconds: 3600
      refresh-expiration-seconds: 604800
    bootstrap-admin:
      username: admin
      email: admin@batchsphere.local
      password: Admin@123
      role: SUPER_ADMIN
    seed-users:
      - username: qc.analyst
        email: qc.analyst@batchsphere.local
        password: Admin@123
        role: QC_ANALYST
      - username: qc.manager
        email: qc.manager@batchsphere.local
        password: Admin@123
        role: QC_MANAGER
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  storage:
    root: storage
