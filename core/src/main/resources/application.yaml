spring:
  application:
    name: batchsphere-core

  datasource:
    url: jdbc:postgresql://localhost:5432/batchsphere_db
    username: batchsphere_user
    password: StrongPassword123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
