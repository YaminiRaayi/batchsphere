spring:
  application:
    name: batchsphere-core

  datasource:
    url: jdbc:postgresql://localhost:5432/batchsphere_db
    username: batchsphere_user
    password: StrongPassword123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    validate-on-migrate: false
    out-of-order: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  storage:
    root: storage
